function escapeHtml(str){ return String(str || '').replace(/[&<>"'`=\/]/g, function(s){ return '&#' + s.charCodeAt(0) + ';'; }); }

// دالة لتحويل التاريخ من صيغة ISO إلى صيغة "HH:mm:ss ll YYYY-MM-DD"
function formatDateFromISO(dateStr) {
  if (!dateStr) return 'غير محدد';
  
  try {
    let date;
    
    // التحقق إذا كان التاريخ بصيغة ISO (مثل: 2025-11-14T12:17:26.000Z)
    if (dateStr.includes('T')) {
      date = new Date(dateStr);
    } else if (dateStr.includes('ll') && dateStr.includes('-') && dateStr.includes(':')) {
      // إذا كان بصيغة "HH:mm:ss ll YYYY-MM-DD" نعيده كما هو
      return dateStr;
    } else if (dateStr.includes('-') && dateStr.includes(' ')) {
      // إذا كان بصيغة "dd-MM-yyyy HH:mm:ss" نعيده كما هو
      return dateStr;
    } else {
      // محاولة تحويله كتاريخ
      date = new Date(dateStr);
    }
    
    // التحقق من صحة التاريخ
    if (isNaN(date.getTime())) {
      return dateStr;
    }
    
    // تحويل التاريخ إلى صيغة "HH:mm:ss ll YYYY-MM-DD"
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const seconds = String(date.getSeconds()).padStart(2, '0');
    
    return `${hours}:${minutes}:${seconds} ll ${year}-${month}-${day}`;
  } catch (err) {
    return dateStr; // في حالة الخطأ، نعيد التاريخ الأصلي
  }
}

function formatToDayMonthYear(dateStr) {
  if (!dateStr && dateStr !== 0) return '';

  // دعم كائنات Timestamp القادمة من فايربيز
  if (typeof dateStr === 'object') {
    if (typeof dateStr.toDate === 'function') {
      return formatDateObject(dateStr.toDate());
    }
    if (typeof dateStr.seconds === 'number') {
      const millis = dateStr.seconds * 1000 + Math.floor((dateStr.nanoseconds || 0) / 1e6);
      return formatDateObject(new Date(millis));
    }
  }

  const trimmed = String(dateStr).trim();
  if (!trimmed) return '';
  
  // إذا كان بصيغة DD-MM-YYYY، أعده كما هو (هذا هو التنسيق المطلوب)
  if (/^\d{2}-\d{2}-\d{4}$/.test(trimmed)) return trimmed;
  
  // إذا كان بصيغة YYYY-MM-DD، حوله مباشرة دون استخدام Date object
  const isoMatch = trimmed.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoMatch) {
    const [, year, month, day] = isoMatch;
    return `${day}-${month}-${year}`;
  }
  
  // إذا كان بصيغة MM-DD-YYYY، حوله إلى DD-MM-YYYY
  const usMatch = trimmed.match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if (usMatch) {
    const [, month, day, year] = usMatch;
    // التحقق من أن الشهر صحيح (01-12)
    const monthNum = parseInt(month);
    const dayNum = parseInt(day);
    if (monthNum >= 1 && monthNum <= 12 && dayNum >= 1 && dayNum <= 31) {
      return `${day}-${month}-${year}`;
    }
  }
  
  // إذا كان بصيغة ISO مع الوقت، استخرج التاريخ مباشرة
  if (trimmed.includes('T')) {
    const isoDateMatch = trimmed.match(/^(\d{4})-(\d{2})-(\d{2})T/);
    if (isoDateMatch) {
      const [, year, month, day] = isoDateMatch;
      return `${day}-${month}-${year}`;
    }
  }
  
  // في الحالات الأخرى، أعد النص كما هو
  return trimmed;
}

function formatDateObject(date) {
  if (!(date instanceof Date) || isNaN(date.getTime())) return '';
  
  // استخدام UTC لتجنب مشاكل المنطقة الزمنية
  const day = String(date.getUTCDate()).padStart(2, '0');
  const month = String(date.getUTCMonth() + 1).padStart(2, '0');
  const year = date.getUTCFullYear();
  return `${day}-${month}-${year}`;
}

// دالة خاصة لعرض التاريخ في الرسائل - تعرض التاريخ كما هو محفوظ
function displayStoredDate(dateStr) {
  if (!dateStr) return '';
  
  const trimmed = String(dateStr).trim();
  
  // إذا كان بصيغة DD-MM-YYYY، أعده كما هو
  if (/^\d{2}-\d{2}-\d{4}$/.test(trimmed)) {
    return trimmed;
  }
  
  // إذا كان بصيغة أخرى، استخدم formatToDayMonthYear
  return formatToDayMonthYear(trimmed);
}

  const lastNameField = document.getElementById("lastNameField");

  if (lastNameField) {

  }

// دالة لتهيئة الاستمارة
function initializeForm() {
  const daairaField = document.getElementById("daairaField");
  if (daairaField) {
    daairaField.addEventListener("change", () => updateBaladiya());
  }

  const maritalField = document.getElementById("maritalStatusField");
  if (maritalField) {
    maritalField.addEventListener("change", toggleChildrenField);
  }

  const dualField = document.getElementById("dualSectorField");
  if (dualField) {
    dualField.addEventListener("change", toggleDualSector);
  }

  const fileSeniorityField = document.getElementById("fileSeniorityField");
  if (fileSeniorityField) {
    fileSeniorityField.addEventListener("change", toggleFileSeniority);
  }

  const spouseIdField = document.getElementById("spouseIdField");
  if (spouseIdField) {
    spouseIdField.addEventListener("blur", verifySpouseInFirebase);
    spouseIdField.addEventListener("input", handleSpouseInput);
  }

  toggleChildrenField();
  toggleDualSector();
  toggleFileSeniority();
  setupDepositYearSelector();
  resetDepositYearSelection();
}

/* عند تغيير الطور أو الدائرة - تحديث سلوك اسم المؤسسة والقوائم */
function handleSpouseInput() {
  const dualField = document.getElementById("dualSectorField");
  if (!dualField || dualField.value !== "نعم") return;

  const spouseIdField = document.getElementById("spouseIdField");
  const statusMessage = document.getElementById("spouseStatusMessage");
  const spouseNameWrapper = document.getElementById("spouseNameWrapper");
  const spouseNameField = document.getElementById("spouseNameField");

  if (!spouseIdField || !statusMessage) return;

  const value = spouseIdField.value.trim();

  if (spouseNameWrapper) spouseNameWrapper.style.display = "none";
  if (spouseNameField) spouseNameField.value = "";

  if (!value) {
    statusMessage.style.display = "none";
    statusMessage.textContent = "";
    if (spouseLookupTimeout) {
      clearTimeout(spouseLookupTimeout);
      spouseLookupTimeout = null;
    }
    return;
  }

  statusMessage.style.display = "block";
  statusMessage.textContent = "⏳ جاري البحث عن معلومات الزوج(ة)...";

  if (value.length < 16) {
    if (spouseLookupTimeout) {
      clearTimeout(spouseLookupTimeout);
      spouseLookupTimeout = null;
    }
    return;
  }

  if (spouseLookupTimeout) {
    clearTimeout(spouseLookupTimeout);
  }
  spouseLookupTimeout = setTimeout(() => {
    spouseLookupTimeout = null;
    verifySpouseInFirebase();
  }, 400);
}

function toggleChildrenField() {
  const maritalField = document.getElementById("maritalStatusField");
  const wrapper = document.getElementById("childrenCountWrapper");
  const childrenField = document.getElementById("childrenCountField");
  const dualSectorWrapper = document.getElementById("dualSectorWrapper");
  const dualSectorField = document.getElementById("dualSectorField");
  const spouseIdWrapper = document.getElementById("spouseIdWrapper");
  const spouseIdField = document.getElementById("spouseIdField");
  const spouseNameWrapper = document.getElementById("spouseNameWrapper");
  const spouseNameField = document.getElementById("spouseNameField");
  const statusMessage = document.getElementById("spouseStatusMessage");
  if (!maritalField || !wrapper || !childrenField) return;

  const needsChildren = ["متزوج(ة)", "مطلق(ة)"].includes(maritalField.value);
  wrapper.style.display = needsChildren ? "block" : "none";

  if (!needsChildren) {
    childrenField.value = "";
  }

  if (dualSectorWrapper) {
    const showDualSector = ["متزوج(ة)", "مطلق(ة)"].includes(maritalField.value);
    dualSectorWrapper.style.display = showDualSector ? "block" : "none";

    if (!showDualSector) {
      if (dualSectorField) dualSectorField.value = "";
      if (spouseIdWrapper) spouseIdWrapper.style.display = "none";
      if (spouseIdField) spouseIdField.value = "";
      if (spouseNameWrapper) spouseNameWrapper.style.display = "none";
      if (spouseNameField) spouseNameField.value = "";
      if (statusMessage) {
        statusMessage.style.display = "none";
        statusMessage.textContent = "";
    }
    }
  }
}

function toggleDualSector() {
  const dualField = document.getElementById("dualSectorField");
  const wrapper = document.getElementById("spouseIdWrapper");
  const spouseIdField = document.getElementById("spouseIdField");
  const spouseNameWrapper = document.getElementById("spouseNameWrapper");
  const spouseNameField = document.getElementById("spouseNameField");
  const statusMessage = document.getElementById("spouseStatusMessage");

  if (!dualField || !wrapper || !spouseIdField || !spouseNameWrapper || !spouseNameField || !statusMessage) return;

  if (dualField.value === "نعم") {
    wrapper.style.display = "block";
        } else {
    wrapper.style.display = "none";
    spouseIdField.value = "";
    spouseNameWrapper.style.display = "none";
    spouseNameField.value = "";
    statusMessage.style.display = "none";
    statusMessage.textContent = "";
    if (spouseLookupTimeout) {
      clearTimeout(spouseLookupTimeout);
      spouseLookupTimeout = null;
        }
  }
}

function toggleFileSeniority() {
  const fileField = document.getElementById("fileSeniorityField");
  const yearWrapper = document.getElementById("depositYearWrapper");
  const yearSelect = document.getElementById("depositYearSelect");
  const yearField = document.getElementById("depositYearField");
  const countWrapper = document.getElementById("depositCountWrapper");
  const countField = document.getElementById("depositCountField");
  if (!fileField || !yearWrapper || !yearField) return;

  const shouldShow = fileField.value === "نعم";
  yearWrapper.style.display = shouldShow ? "block" : "none";
  if (yearSelect) yearSelect.disabled = !shouldShow;
  if (countWrapper) countWrapper.style.display = shouldShow ? "block" : "none";

  if (!shouldShow) {
    resetDepositYearSelection();
    if (countField) countField.value = "";
  }
}

function setupDepositYearSelector() {
  const select = document.getElementById("depositYearSelect");
  const tagsContainer = document.getElementById("depositYearTags");
  if (select) {
    select.addEventListener("change", () => {
      const value = select.value;
      if (!value) return;
      addDepositYear(value);
      select.value = "";
    });
  }
  if (tagsContainer) {
    tagsContainer.addEventListener("click", (event) => {
      const target = event.target.closest("[data-year]");
      if (!target || !target.classList.contains("tag-remove")) return;
      const year = target.getAttribute("data-year");
      removeDepositYear(year);
    });
  }
}

function getDepositYearValues() {
  const field = document.getElementById("depositYearField");
  if (!field) return [];
  const data = field.dataset.years;
  if (!data) return [];
  try {
    const parsed = JSON.parse(data);
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return field.value
      ? field.value.split(",").map(year => year.trim()).filter(Boolean)
      : [];
  }
}

function parseDepositYears(source) {
  if (!source && source !== 0) return [];
  if (Array.isArray(source)) {
    return source.map(item => String(item).trim()).filter(Boolean);
  }
  return String(source)
    .split(",")
    .map(part => part.trim())
    .filter(Boolean);
}

function setDepositYears(years = []) {
  const field = document.getElementById("depositYearField");
  if (!field) return;
  const normalized = Array.from(new Set(years.map(year => String(year).trim()).filter(Boolean)));
  field.dataset.years = JSON.stringify(normalized);
  field.value = normalized.length ? normalized.join(", ") : "";
  renderDepositYearTags(normalized);
}

function addDepositYear(year) {
  const current = getDepositYearValues();
  if (current.includes(year)) return;
  current.push(year);
  setDepositYears(current);
}

function removeDepositYear(year) {
  const filtered = getDepositYearValues().filter(item => item !== year);
  setDepositYears(filtered);
}

function resetDepositYearSelection() {
  setDepositYears([]);
}

function renderDepositYearTags(years = []) {
  const container = document.getElementById("depositYearTags");
  if (!container) return;
  if (!years.length) {
    container.innerHTML = `<span class="small-note" style="border:none;margin-top:0;">لم يتم اختيار سنة</span>`;
    return;
  }
  container.innerHTML = years.map(year => `
    <span class="deposit-tag" data-year="${year}">
      ${year}
      <span class="tag-remove" data-year="${year}" role="button" aria-label="حذف السنة ${year}">✕</span>
    </span>
  `).join("");
}

async function verifySpouseInFirebase() {
  const dualField = document.getElementById("dualSectorField");
  if (!dualField || dualField.value !== "نعم") return;

  const spouseIdField = document.getElementById("spouseIdField");
  const statusMessage = document.getElementById("spouseStatusMessage");
  const spouseNameWrapper = document.getElementById("spouseNameWrapper");
  const spouseNameField = document.getElementById("spouseNameField");

  if (!spouseIdField || !statusMessage || !spouseNameWrapper || !spouseNameField) return;

  const spouseId = spouseIdField.value.trim();

  spouseNameField.value = "";
  spouseNameWrapper.style.display = "none";
  statusMessage.style.display = "none";
  statusMessage.textContent = "";

  if (!spouseId) return;

  if (spouseId.length !== 16) {
    statusMessage.style.display = "block";
    statusMessage.textContent = "يجب أن يتكون رقم التعريف من 16 رقمًا.";
    return;
  }

  statusMessage.style.display = "block";
  statusMessage.textContent = "جاري التحقق من الرقم...";

  try {
    let spouseData = null;
    const docRef = db.collection("employeescom").doc(spouseId);
    const docSnap = await docRef.get();

    if (docSnap.exists) {
      spouseData = docSnap.data();
      } else {
      const querySnap = await db.collection("employeescom")
        .where("empId", "==", spouseId)
        .limit(1)
        .get();
      if (!querySnap.empty) {
        spouseData = querySnap.docs[0].data();
      }
    }

    if (!spouseData) {
      statusMessage.textContent = "لم يتم العثور على رقم التعريف في قاعدة البيانات.";
      return;
    }

    spouseNameField.value = spouseData.name || "";
    spouseNameWrapper.style.display = "block";
    statusMessage.textContent = "تم التحقق بنجاح.";
  } catch (error) {
    console.error("Spouse verification error:", error);
    statusMessage.textContent = "تعذر التحقق من قاعدة البيانات.";
  }
}

function updateBaladiya(selectedBaladiya = "") {
  const daairaField = document.getElementById("daairaField");
  const baladiyaSelect = document.getElementById("baladiyaField");

  if (!daairaField || !baladiyaSelect) return;

  const daaira = daairaField.value;
  baladiyaSelect.innerHTML = '<option value="">اختر البلدية</option>';

  if (daaira && window.baladiyaMap[daaira]) {
    window.baladiyaMap[daaira].forEach(b => {
      const option = document.createElement("option");
      option.value = b;
      option.text = b;
      baladiyaSelect.add(option);
    });
  }

  if (selectedBaladiya) {
    baladiyaSelect.value = selectedBaladiya;
  }
}

/* دالة للتحقق من الحروف العربية فقط */
function allowArabicOnly(input) {
  // إزالة كل شيء ما عدا الحروف العربية والمسافات
  let value = input.value.replace(/[^\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF\s]/g, '');
  input.value = value;
}

// دالة لحساب السن تلقائياً من تاريخ الميلاد
function calculateChildAge() {
  const birthDateField = document.getElementById("childBirthDateField");
  const ageField = document.getElementById("childAgeField");
  
  if (!birthDateField || !ageField) return;
  
  const birthDateStr = birthDateField.value;
  if (!birthDateStr) {
    ageField.value = "";
    return;
  }
  
  try {
    const birthDate = new Date(birthDateStr);
    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    const monthDiff = today.getMonth() - birthDate.getMonth();
    
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
      age--;
    }
    
    ageField.value = age >= 0 ? age : "";
    
    // ✅ التحقق من السن وعرض تحذير إذا كان خارج النطاق المسموح
    if (age >= 0) {
      if (age < 12 || age > 18) {
        // تغيير لون الحقل للإشارة إلى الخطأ
        ageField.style.border = "2px solid #dc3545";
        ageField.style.backgroundColor = "#fff5f5";
        
        // عرض تحذير
        setTimeout(() => {
          Swal.fire({
            icon: "warning",
            title: "تنبيه",
            text: "لا يمكن تسجيل الإبن إلا إذا كان سنه بين 12 و 18 سنة",
            confirmButtonText: "حسناً"
          });
        }, 300);
      } else {
        // إعادة الحقل إلى حالته الطبيعية
        ageField.style.border = "";
        ageField.style.backgroundColor = "";
      }
    }
  } catch (error) {
    console.error("Error calculating age:", error);
    ageField.value = "";
  }
}

/* تنسيق رقم الهاتف على شكل 00 00 00 00 00 */
function formatPhoneSimple(input) {
  // إزالة كل شيء ما عدا الأرقام
  let value = input.value.replace(/\D/g, '');
  
  // تحديد إلى 10 أرقام
  value = value.slice(0, 10);
  
  // تنسيق على شكل 00 00 00 00 00
  if (value.length > 0) {
    let formatted = '';
    for (let i = 0; i < value.length; i++) {
      if (i > 0 && i % 2 === 0) {
        formatted += ' ';
      }
      formatted += value[i];
    }
    input.value = formatted;
  } else {
    input.value = '';
  }
}

/* تنسيق رقم الهاتف الثابت على شكل 000 00 00 00 (9 أرقام) */
function formatFixedPhone(input) {
  // إزالة كل شيء ما عدا الأرقام
  let value = input.value.replace(/\D/g, '');
  
  // تحديد إلى 9 أرقام
  value = value.slice(0, 9);
  
  // تنسيق على شكل 000 00 00 00
  if (value.length > 0) {
    let formatted = '';
    // أول 3 أرقام
    if (value.length >= 3) {
      formatted = value.slice(0, 3);
      if (value.length > 3) {
        formatted += ' ' + value.slice(3, 5);
        if (value.length > 5) {
          formatted += ' ' + value.slice(5, 7);
          if (value.length > 7) {
            formatted += ' ' + value.slice(7, 9);
          }
        }
      }
    } else {
      formatted = value;
    }
    input.value = formatted;
  } else {
    input.value = '';
  }
}

/* دالة لتنسيق رقم الهاتف من رقم عادي إلى تنسيق 00 00 00 00 00 */
function formatPhoneNumber(phone) {
  if (!phone) return '';
  // إزالة علامة الاقتباس في البداية إن وجدت (من Google Sheets)
  let phoneStr = String(phone).replace(/^'/, '');
  // إزالة كل شيء ما عدا الأرقام والمسافات
  let value = phoneStr.replace(/[^\d\s]/g, '');
  // إزالة المسافات ثم إعادة التنسيق
  value = value.replace(/\s/g, '');
  // تحديد إلى 10 أرقام
  value = value.slice(0, 10);
  // تنسيق على شكل 00 00 00 00 00
  if (value.length === 10) {
    return value.slice(0, 2) + ' ' + value.slice(2, 4) + ' ' + 
           value.slice(4, 6) + ' ' + value.slice(6, 8) + ' ' + value.slice(8, 10);
  } else if (value.length > 0) {
    // إذا كان الرقم أقل من 10 أرقام، ننسقه كما هو
    let formatted = '';
    for (let i = 0; i < value.length; i++) {
      if (i > 0 && i % 2 === 0) {
        formatted += ' ';
      }
      formatted += value[i];
    }
    return formatted;
  }
  return '';
}

/* دالة لتنسيق رقم الهاتف الثابت من رقم عادي إلى تنسيق 000 00 00 00 */
function formatFixedPhoneNumber(phone) {
  if (!phone) return '';
  // إزالة علامة الاقتباس في البداية إن وجدت (من Google Sheets)
  let phoneStr = String(phone).replace(/^'/, '');
  // إزالة كل شيء ما عدا الأرقام والمسافات
  let value = phoneStr.replace(/[^\d\s]/g, '');
  // إزالة المسافات ثم إعادة التنسيق
  value = value.replace(/\s/g, '');
  // تحديد إلى 9 أرقام
  value = value.slice(0, 9);
  // تنسيق على شكل 000 00 00 00
  if (value.length === 9) {
    return value.slice(0, 3) + ' ' + value.slice(3, 5) + ' ' + 
           value.slice(5, 7) + ' ' + value.slice(7, 9);
  } else if (value.length > 0) {
    // إذا كان الرقم أقل من 9 أرقام، ننسقه تدريجياً
    let formatted = '';
    if (value.length >= 3) {
      formatted = value.slice(0, 3) + ' ';
      if (value.length >= 5) {
        formatted += value.slice(3, 5) + ' ';
        if (value.length >= 7) {
          formatted += value.slice(5, 7) + ' ';
          if (value.length >= 9) {
            formatted += value.slice(7, 9);
          } else {
            formatted += value.slice(7);
          }
        } else {
          formatted += value.slice(5);
        }
      } else {
        formatted += value.slice(3);
      }
    } else {
      formatted = value;
    }
    return formatted;
  }
  return '';
}

function prepareReceiptData(raw = {}, options = {}) {
  const normalize = (value) => {
    if (value === undefined || value === null) return "";
    return String(value).trim();
  };

  // بيانات خاصة بالمتقاعدين فقط
  const data = {
    personalPhone: normalize(raw.personalPhone || raw.phone || raw.phoneField),
    lastName: normalize(raw.lastName || raw.lastNameField),
    name: normalize(raw.name || raw.nameField),
    birthDate: normalize(raw.birthDate || raw.birthDateField),
    daira: normalize(raw.daira || raw.daaira || raw.district || raw.daairaField),
    baladiya: normalize(raw.baladiya || raw.municipality || raw.baladiyaField),
    childFullName: normalize(raw.childFullName || raw.childFullNameField),
    childBirthDate: normalize(raw.childBirthDate || raw.childBirthDateField),
    childAge: normalize(raw.childAge || raw.childAgeField),
    category: normalize(raw.category || raw.categoryField),
    trip: normalize(raw.trip || raw.tripField)
  };

  data.birthDate = data.birthDate ? displayStoredDate(data.birthDate) : "";
  data.personalPhone = data.personalPhone ? formatPhoneNumber(data.personalPhone) : "";
  
  // تحويل تاريخ ميلاد الإبن من YYYY-MM-DD إلى DD-MM-YYYY
  if (data.childBirthDate) {
    const childBirthDateStr = String(data.childBirthDate).trim();
    // إذا كان بصيغة YYYY-MM-DD، حوله إلى DD-MM-YYYY
    if (/^\d{4}-\d{2}-\d{2}$/.test(childBirthDateStr)) {
      const parts = childBirthDateStr.split('-');
      data.childBirthDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
    } else {
      // إذا كان بصيغة أخرى، استخدم displayStoredDate
      data.childBirthDate = displayStoredDate(childBirthDateStr);
    }
  }
  
  data.registrationDate = options.registrationDate || raw.registrationDate || raw.date || new Date().toISOString();
  data.modificationDate = options.modificationDate || raw.modificationDate || "";
  data.actionSource = options.actionSource || "";

  return data;
}

function openReceiptPreview(rawData = {}, options = {}) {
  const normalized = prepareReceiptData(rawData, options);
  const receiptHTML = renderReceiptTemplate(normalized);
  const receiptWindow = window.open("", "_blank");

  if (!receiptWindow) {
    Swal.fire("تنبيه", "يرجى السماح بفتح النوافذ المنبثقة لتحميل الوصل", "warning");
    return;
  }

  receiptWindow.document.open();
  receiptWindow.document.write(receiptHTML);
  receiptWindow.document.close();
  receiptWindow.focus();
}

function attachReceiptButton(buttonId, rawData = {}, options = {}) {
  const btn = document.getElementById(buttonId);
  if (!btn) return;

  btn.addEventListener("click", (event) => {
    event.preventDefault();
    openReceiptPreview(rawData, options);
  });
}



/* تحقق من الإيميل */
function validateEmail(email) {
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  return re.test(String(email).toLowerCase());
}

function validateGmail(input) {
  // إزالة المسافات
  input.value = input.value.replace(/\s/g, '');
  
  // منع الحروف العربية
  input.value = input.value.replace(/[\u0600-\u06FF]/g, '');
  
  // إجبار النص على حروف صغيرة
  input.value = input.value.toLowerCase();
  
  // السماح فقط بـ gmail
  if (!input.value.endsWith("@gmail.com") && input.value.length > 0) {
    input.setCustomValidity("يُسمح فقط بحسابات gmail");
  } else {
    input.setCustomValidity("");
  }
}
